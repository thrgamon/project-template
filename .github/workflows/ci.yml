name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for duplicate migration versions
        run: |
          versions=$(ls migrations/*.sql 2>/dev/null | sed 's/.*\///' | cut -d'_' -f1 | sort)
          dupes=$(echo "$versions" | uniq -d)
          if [ -n "$dupes" ]; then
            echo "Duplicate migration versions: $dupes"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run migrations
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          goose -dir migrations postgres "postgres://postgres:postgres@localhost:5432/myapp_test?sslmode=disable" up
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/myapp_test?sslmode=disable
        run: go test -race ./...

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run check
      - run: npm run lint

  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install tools
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          go install github.com/swaggo/swag/cmd/swag@latest
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin
      - run: npm ci
      - name: Run sync
        run: just sync
      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "Generated code is out of date:"
            git diff --name-only
            exit 1
          fi

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [migrations, lint, test, check, sync]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Deploy to Dokku
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_KEY }}" > ~/.ssh/dokku_key
          chmod 600 ~/.ssh/dokku_key
          ssh-keyscan -H 5.75.255.138 >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/dokku_key" git remote add dokku dokku@5.75.255.138:myapp
          GIT_SSH_COMMAND="ssh -i ~/.ssh/dokku_key" git push dokku main --force
