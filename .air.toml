root = "."
tmp_dir = "tmp"

[build]
cmd = "CGO_ENABLED=0 go build -o ./tmp/server ./cmd/server"
bin = "./tmp/server"
delay = 500
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
include_dir = ["cmd", "internal"]
exclude_dir = ["tmp", "src", "node_modules"]

[log]
color = "auto"

[misc]
clean_on_exit = true
